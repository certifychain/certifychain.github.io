<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertifyChain</title>
    <link rel="shortcut icon" href="https://avatars.githubusercontent.com/u/146720572" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 flex flex-col min-h-screen text-white">
    <div class="flex min-h-screen flex-col justify-center items-center">
        <div class="bg-gray-700 p-5 text-gray-300">
            <p class="text-4xl text-center sm:text-5xl m-5">Public Validation Tool</p>
            <div class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    Certificate ID:
                    <input type="text" class="p-1 bg-gray-600 border-2 border-gray-700 text-white">
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" class="text-gray-700">
                    <span class="text-gray-300 text-center">I have the consent of the certificate owner to view their certificate</span>
                </div>
                <button class="rounded-xl text-center py-2 px-5 bg-gray-300 text-gray-800">Validate</button>
            </div>
        </div>
    </div>
</body>
</html>
