<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertifyChain</title>
    <link rel="shortcut icon" href="https://avatars.githubusercontent.com/u/146720572" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-800 flex flex-col justify-center min-h-screen">
    <div class="bg-slate-500 p-10">
        <div class="max-w-[800px] m-auto">
            <div class="text-3xl mb-4 font-bold">
                Contact Us
            </div>
            <p class="mb-4">
                Have questions, suggestions, or just want to say hi?
                We'd love to hear from you! Reach out to us using
                the form below or drop us an email.
            </p>
            <form class="space-y-4">
                <div class="flex flex-col md:flex-row md:space-x-4">
                    <div class="mb-4 md:w-1/2">
                        <label for="name" class="block text-white">Your Name</label>
                        <input type="text" id="name" name="name"
                            class="w-full px-4 py-2 rounded bg-slate-700 border border-slate-600 text-white focus:outline-none focus:border-slate-500"
                            required>
                    </div>
                    <div class="mb-4 md:w-1/2">
                        <label for="email" class="block text-white">Your Email</label>
                        <input type="email" id="email" name="email"
                            class="w-full px-4 py-2 rounded bg-slate-700 border border-slate-600 text-white focus:outline-none focus:border-slate-500"
                            required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="message" class="block text-white">Your Message</label>
                    <textarea id="message" name="message" rows="4"
                        class="w-full px-4 py-2 rounded bg-slate-700 border border-slate-600 text-white focus:outline-none focus:border-slate-500"
                        required></textarea>
                </div>
                <div class="flex justify-center">
                    <button type="submit" class="max-w-[600px] grow bg-slate-800 text-white px-6 py-3 rounded-full font-bold hover:bg-slate-400 hover:text-slate-800">
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
